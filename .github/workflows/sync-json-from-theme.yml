name: Sync JSON from Production Repo

on:
  workflow_dispatch:

jobs:
  sync-json:
    name: Pull template JSON from production repo → source repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull all JSON from production repo
        env:
          PROD_REPO_PAT: ${{ secrets.PROD_REPO_PAT }}
        run: |
          PROD_DIR=$(mktemp -d)
          git clone "https://x-access-token:${PROD_REPO_PAT}@github.com/mohit-aroraa/BPN-Prod.git" "$PROD_DIR"

          # Pull all JSON files from production repo into source — no merge, full replace.
          # Covers templates/, config/, locales/ and any other JSON the live theme manages.
          find "$PROD_DIR" -name '*.json' -not -path '*/.git/*' | while IFS= read -r f; do
            REL="${f#$PROD_DIR/}"
            TARGET="src/liquid/$REL"
            mkdir -p "$(dirname "$TARGET")"
            cp "$f" "$TARGET"
            echo "Synced: $REL"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/liquid/
          if git diff --staged --quiet; then
            echo "No JSON changes — source repo is already up to date."
            exit 0
          fi

          CHANGED=$(git diff --staged --name-only | wc -l | tr -d ' ')
          git commit -m "sync: pull ${CHANGED} json files from production repo"
          git push origin main
