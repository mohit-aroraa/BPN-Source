name: Sync JSON from Shopify Theme

on:
  workflow_dispatch:
    inputs:
      theme_id:
        description: 'Theme ID to pull JSON from'
        required: true
        type: string
      sync_branch:
        description: 'Branch to create (e.g. sync/json-20260623)'
        required: true
        type: string
      pr_target:
        description: 'Branch to raise the PR against'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-json:
    name: Pull JSON from Shopify → PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_target }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ inputs.sync_branch }}"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@3.84.1

      - name: Pull JSON from Shopify theme
        run: |
          TEMP=$(mktemp -d)

          shopify theme pull \
            --store "${{ vars.SHOPIFY_STORE_URL }}" \
            --theme "${{ inputs.theme_id }}" \
            --path "$TEMP" \
            --force

          find "$TEMP/templates" -name "*.json" 2>/dev/null | while IFS= read -r f; do
            REL="${f#$TEMP/templates/}"
            TARGET="src/liquid/templates/$REL"
            mkdir -p "$(dirname "$TARGET")"
            cp "$f" "$TARGET"
          done

          find "$TEMP/config" -name "*.json" 2>/dev/null | while IFS= read -r f; do
            REL="${f#$TEMP/config/}"
            TARGET="src/config/$REL"
            mkdir -p "$(dirname "$TARGET")"
            cp "$f" "$TARGET"
          done

          find "$TEMP/locales" -name "*.json" 2>/dev/null | while IFS= read -r f; do
            REL="${f#$TEMP/locales/}"
            TARGET="src/locales/$REL"
            mkdir -p "$(dirname "$TARGET")"
            cp "$f" "$TARGET"
          done
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - name: Commit and push sync branch
        id: commit
        run: |
          git add -f src/liquid/templates/ src/config/ src/locales/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No JSON changes — already up to date."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --staged --name-only)
          COUNT=$(echo "$CHANGED" | grep -c . || true)

          echo "changed=true"   >> $GITHUB_OUTPUT
          echo "count=$COUNT"   >> $GITHUB_OUTPUT

          DELIMITER=$(openssl rand -base64 12 | tr -dc 'a-zA-Z0-9' | head -c 16)
          echo "files<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$CHANGED"          >> $GITHUB_OUTPUT
          echo "$DELIMITER"        >> $GITHUB_OUTPUT

          git commit -m "sync: pull $COUNT json files from theme ${{ inputs.theme_id }}"
          git push --force origin "${{ inputs.sync_branch }}"

      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "sync: json from theme ${{ inputs.theme_id }} → \`${{ inputs.pr_target }}\`" \
            --base "${{ inputs.pr_target }}" \
            --head "${{ inputs.sync_branch }}" \
            --body "$(cat <<'EOF'
          ## JSON Sync from Shopify Theme

          Pulled latest JSON files from theme `${{ inputs.theme_id }}`.

          **Target branch:** \`${{ inputs.pr_target }}\`

          ### Changed files (${{ steps.commit.outputs.count }})

          \`\`\`
          ${{ steps.commit.outputs.files }}
          \`\`\`

          > Review \`settings_data.json\` carefully before merging.
          EOF
          )"
