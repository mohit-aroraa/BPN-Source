name: Cross-Sync JSON Between Themes

# Copies JSON files from source theme into target theme.
# Files that exist only in the target (e.g. new templates added by devs) are preserved.
# Nothing is committed to git — this is a direct Shopify-to-Shopify sync.

on:
  workflow_dispatch:
    inputs:
      source_theme_id:
        description: 'Source theme ID (pull JSON from here)'
        required: true
        type: string
      target_theme_id:
        description: 'Target theme ID (push JSON to here)'
        required: true
        type: string

jobs:
  cross-sync:
    name: Copy JSON between Shopify themes
    runs-on: ubuntu-latest

    steps:
      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@3.84.1

      - name: Pull source theme
        run: |
          SOURCE_DIR=$(mktemp -d)
          echo "SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_ENV

          shopify theme pull \
            --store "${{ vars.SHOPIFY_STORE_URL }}" \
            --theme "${{ inputs.source_theme_id }}" \
            --path "$SOURCE_DIR" \
            --force
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - name: Pull target theme
        run: |
          TARGET_DIR=$(mktemp -d)
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

          shopify theme pull \
            --store "${{ vars.SHOPIFY_STORE_URL }}" \
            --theme "${{ inputs.target_theme_id }}" \
            --path "$TARGET_DIR" \
            --force
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - name: Overlay source JSON onto target
        # Copies JSON files from source into target.
        # JSON files that only exist in target (new dev templates etc.) are untouched.
        run: |
          JSON_FILES=$(find "$SOURCE_DIR" -name "*.json")
          COUNT=$(echo "$JSON_FILES" | grep -c . || true)

          echo "Syncing $COUNT JSON files from theme ${{ inputs.source_theme_id }} → theme ${{ inputs.target_theme_id }}"
          echo "$JSON_FILES" | sed "s|$SOURCE_DIR/|  |"

          echo "$JSON_FILES" | while IFS= read -r f; do
            REL="${f#$SOURCE_DIR/}"
            TARGET="$TARGET_DIR/$REL"
            mkdir -p "$(dirname "$TARGET")"
            cp "$f" "$TARGET"
          done

      - name: Push updated target theme to Shopify
        run: |
          shopify theme push \
            --store "${{ vars.SHOPIFY_STORE_URL }}" \
            --theme "${{ inputs.target_theme_id }}" \
            --path "$TARGET_DIR"

          echo "Cross-sync complete → theme ${{ inputs.target_theme_id }}"
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
